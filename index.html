<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  >

  <title>Tabla Periódica AR</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="./styles/style.css">

  <!-- JS -->
  <script defer src="./scripts/app.js"></script>
</head>

<body>

  <!-- LOADER -->

  <div id="loadingScreen">

    <div class="loaderBox">

      <img src="./assets/logo.png" class="logo">

      <h1>Tabla Periódica AR</h1>

      <p>Cargando experiencia...</p>

      <div class="loadingBar">
        <div class="loadingProgress"></div>
      </div>

    </div>

  </div>

  <!-- PANEL -->

  <div id="infoPanel">

    <h2 id="elementName">
      Tabla Periódica
    </h2>

    <p id="elementInfo">
      Escanea un elemento.
    </p>

  </div>

  <!-- SELECTOR -->

  <select id="blockSelector">

    <option value="bloque1">
      Bloque 1
    </option>

    <option value="bloque2">
      Bloque 2
    </option>

    <option value="bloque3">
      Bloque 3
    </option>

  </select>

  <!-- FULLSCREEN -->

  <button id="fullscreenBtn">
    ⛶
  </button>

  <!-- WATERMARK -->

  <div class="watermark">
    Proyecto I.E. San José del Citará
  </div>

  <!-- ESCENA -->

  <a-scene

    id="scene"

    color-space="sRGB"

    renderer="
      colorManagement: true;
      physicallyCorrectLights
    "

    vr-mode-ui="enabled: false"

    device-orientation-permission-ui="enabled: false"

    mindar-image="
      imageTargetSrc: ./targets/bloque1.mind;
      autoStart: true;
      uiScanning: true;
      uiLoading: true;
    "
  >

    <!-- CÁMARA -->

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
    ></a-camera>

    <!-- CONTENEDOR -->

    <a-entity id="targetsContainer"></a-entity>

    <!-- LUCES -->

    <a-light
      type="ambient"
      intensity="1.2"
    ></a-light>

    <a-light
      type="directional"
      intensity="1"
      position="0 2 1"
    ></a-light>

  </a-scene>

</body>
</html>
