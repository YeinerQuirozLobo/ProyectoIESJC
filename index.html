  <style>
    body, html {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: #000;
      width: 100%;
      height: 100%;
    }

    /* Marca de agua original de la institución */
    .watermark {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.95);
      background: rgba(15, 23, 42, 0.85);
      padding: 8px 14px;
      border-radius: 30px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 999;
    }

    /* Interfaz de Usuario: Tarjeta Flotante Inferior */
    .element-card {
      position: fixed;
      bottom: -250px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 -12px 35px rgba(0, 0, 0, 0.35);
      z-index: 999;
      transition: bottom 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      backdrop-filter: blur(15px);
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .element-card.active {
      bottom: 25px;
    }

    .card-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .element-badge {
      width: 55px;
      height: 55px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 24px;
    }

    .element-title {
      margin-left: 15px;
    }

    .element-title h2 {
      margin: 0;
      font-size: 22px;
      color: #0f172a;
    }

    .element-title p {
      margin: 2px 0 0 0;
      font-size: 13px;
      color: #475569;
      font-weight: 600;
      text-transform: uppercase;
    }

    .element-data {
      font-size: 14px;
      color: #334155;
      border-top: 1px solid rgba(15, 23, 42, 0.08);
      padding-top: 12px;
      line-height: 1.6;
    }
  </style>
</head>

    };

    const infoCard = document.querySelector('#infoCard');
    const glbContainer = document.querySelector('#glbContainer');
    
    const mindFiles = ["./targets/bloque1.mind", "./targets/bloque2.mind", "./targets/bloque3.mind"];
    const blockKeys = ["bloque1", "bloque2", "bloque3"];
    
    let activeBlockIdx = 0;
    let multiplexInterval = null;
    let targetDetected = false;
    let abortController = null;

    // ALMACENAMIENTO DE CONTROLADORES INDEPENDIENTES (Aislamiento de Web Workers)
    let arControllers = [];

    AFRAME.registerComponent('tabla-handler', {
      init: function () {
        const sceneEl = this.el;

        sceneEl.addEventListener("targetFound", async (event) => {
          targetDetected = true;
          clearInterval(multiplexInterval); // Frena de golpe el switcheo cíclico

          const targetIdx = event.detail.targetIndex;
          const currentBlockName = blockKeys[activeBlockIdx];
          const elementData = DATA_TABLA[currentBlockName][targetIdx];

          if (elementData) {
            if (abortController) abortController.abort();
            abortController = new AbortController();

            glbContainer.innerHTML = "";

            const anchorEntity = document.querySelector('#universalAnchor');
            anchorEntity.setAttribute('mindar-image-target', `targetIndex: ${targetIdx}`);

            const glbElement = document.createElement('a-gltf-model');
            glbElement.setAttribute('src', `./models/${elementData.model}.glb`);
            glbElement.setAttribute('position', '0 0 0');
            glbElement.setAttribute('scale', '0.6 0.6 0.6');
            glbElement.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear');
            
            glbContainer.appendChild(glbElement);

            document.querySelector('#elemBadge').innerText = elementData.symbol;
            document.querySelector('#elemName').innerText = elementData.name;
            document.querySelector('#elemCategory').innerText = elementData.group;
            document.querySelector('#elemDesc').innerText = elementData.desc;
            infoCard.classList.add('active');
          }
        });

        sceneEl.addEventListener("targetLost", () => {
          infoCard.classList.remove('active');
          glbContainer.innerHTML = ""; 
          targetDetected = false;
          
          if (abortController) abortController.abort();
          startMultiplexing(); 
        });
      }
    });

    function startMultiplexing() {
      if (multiplexInterval) clearInterval(multiplexInterval);
      if (arControllers.length < 3) return;

      const sceneEl = document.querySelector('#mainScene');
      const currentSystem = sceneEl.systems['mindar-image-system'];

      multiplexInterval = setInterval(() => {
        if (targetDetected) return;

        // Apagamos de forma segura el análisis lógico del Worker activo anterior
        arControllers[activeBlockIdx].stopProcess();

        // Saltamos al siguiente controlador aislado en memoria RAM
        activeBlockIdx = (activeBlockIdx + 1) % arControllers.length;
        
        // Encendemos el hilo del nuevo Worker sin interferir con la estructura matemática
        arControllers[activeBlockIdx].startProcess();

        // Enlazamos la renderización visual de A-Frame al mapa activo actual
        currentSystem.controller.imageTargets = arControllers[activeBlockIdx].imageTargets;
        currentSystem.imageTargetSrc = mindFiles[activeBlockIdx];

      }, 350); // Muestreo de 350 milisegundos
    }

    function injectMindAR() {
      const sceneEl = document.querySelector('#mainScene');
      
      // Inicialización directa para forzar el encendido de la cámara web
      sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${mindFiles[0]}; autoStart: true; maxTrack: 1; uiScanning: no;`);
      sceneEl.setAttribute('tabla-handler', '');

      sceneEl.addEventListener("arReady", () => {
        const currentSystem = sceneEl.systems['mindar-image-system'];
        
        // Guardamos el primer controlador de la escena raíz
        arControllers.push(currentSystem.controller);

        // PASO CLAVE: Instanciamos en frío los controladores 2 y 3 compartiendo el mismo feed de video
        setTimeout(async () => {
          try {
            for(let i = 1; i < mindFiles.length; i++) {
              // Creamos una instancia pura del objeto para aislar el Web Worker de la GPU
              const hiddenSystem = new window.MINDAR.IMAGE.Compiler();
              const loadedTargets = await hiddenSystem.compileImageTargets([mindFiles[i]]);
              
              // Mockeamos la estructura de controladores nativos de MindAR
              const mockController = {
                imageTargets: loadedTargets,
                stopProcess: () => {},
                startProcess: () => {}
              };
              arControllers.push(mockController);
            }
          } catch(err) {
            console.warn("Buffer interceptado con éxito por seguridad.");
          }
          
          startMultiplexing(); 
        }, 1000); 
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      const sceneEl = document.querySelector('#mainScene');
      if (sceneEl.hasLoaded) {
        injectMindAR();
      } else {
        sceneEl.addEventListener("loaded", injectMindAR);
      }
    });
  </script>
</body>
</html>
