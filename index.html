<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla Periódica RA - Sistema IE San José</title>

  <!-- Componentes Estables de Renderizado WebAR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body, html {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: #000;
      width: 100%;
      height: 100%;
    }

    .watermark {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.95);
      background: rgba(15, 23, 42, 0.85);
      padding: 8px 14px;
      border-radius: 30px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 999;
    }

    .element-card {
      position: fixed;
      bottom: -250px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 -12px 35px rgba(0, 0, 0, 0.35);
      z-index: 999;
      transition: bottom 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      backdrop-filter: blur(15px);
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .element-card.active {
      bottom: 25px;
    }

    .card-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .element-badge {
      width: 55px;
      height: 55px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 24px;
    }

    .element-title {
      margin-left: 15px;
    }

    .element-title h2 {
      margin: 0;
      font-size: 22px;
      color: #0f172a;
    }

    .element-title p {
      margin: 2px 0 0 0;
      font-size: 13px;
      color: #475569;
      font-weight: 600;
      text-transform: uppercase;
    }

    .element-data {
      font-size: 14px;
      color: #334155;
      border-top: 1px solid rgba(15, 23, 42, 0.08);
      padding-top: 12px;
      line-height: 1.6;
    }

    .ar-loader {
      position: fixed;
      top: 15px;
      right: 15px;
      font-size: 11px;
      color: #3b82f6;
      background: rgba(15, 23, 42, 0.9);
      padding: 8px 14px;
      border-radius: 20px;
      font-weight: 600;
      z-index: 999;
      border: 1px solid rgba(59, 130, 246, 0.3);
      display: none;
    }
  </style>
</head>
<body>

  <div class="watermark">Sistema IE San José</div>
  <div id="loaderStatus" class="ar-loader">Optimizando Tabla Continua...</div>

  <div id="infoCard" class="element-card">
    <div class="card-header">
      <div id="elemBadge" class="element-badge">-</div>
      <div class="element-title">
        <h2 id="elemName">-</h2>
        <p id="elemCategory">-</p>
      </div>
    </div>
    <div class="element-data">
      <span id="elemDesc">-</span>
    </div>
  </div>

  <!-- ESCENA MATRIZ ÚNICA -->
  <a-scene id="mainScene" embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
    
    <!-- Nodo de Transformación Universal Dinámico -->
    <a-entity id="universalAnchor" mindar-image-target="targetIndex: 0">
      <a-entity id="glbContainer"></a-entity>
    </a-entity>
  </a-scene>

  <script>
    const DATA_TABLA = {
      "bloque1": {
        0: { symbol: "H", name: "Hidrógeno", group: "No Metal", desc: "Gas altamente inflamable, el elemento más ligero y abundante del universo.", model: "1H" },
        1: { symbol: "He", name: "Helio", group: "Gas Noble", desc: "Gas inerte, incoloro y el segundo elemento más ligero de la tabla.", model: "2He" },
        2: { symbol: "Li", name: "Litio", group: "Metal Alcalino", desc: "Metal blando, utilizado en la fabricación de baterías recargables.", model: "3Li" }
      },
      "bloque2": {
        0: { symbol: "Nb", name: "Niobio", group: "Metal de Transición", desc: "Metal superconductor usado en imanes de escáneres médicos por resonancia.", model: "41Nb" },
        1: { symbol: "Mo", name: "Molibdeno", group: "Metal de Transición", desc: "Soporta temperaturas térmicas extremas sin perder rigidez estructural.", model: "42Mo" }
      },
      "bloque3": {
        0: { symbol: "Tl", name: "Talio", group: "Metal del bloque p", desc: "Metal blando y maleable; sus sales cambian de coloración al calentarse.", model: "81Tl" },
        1: { symbol: "Pb", name: "Plomo", group: "Metal del bloque p", desc: "Metal pesado denso, excelente escudo de absorción antirradiación.", model: "82Pb" }
      }
    };

    const infoCard = document.querySelector('#infoCard');
    const glbContainer = document.querySelector('#glbContainer');
    const loaderStatus = document.querySelector('#loaderStatus');
    
    const mindFiles = ["./targets/bloque1.mind", "./targets/bloque2.mind", "./targets/bloque3.mind"];
    const blockKeys = ["bloque1", "bloque2", "bloque3"];
    
    let activeBlockIdx = 0;
    let multiplexInterval = null;
    let targetDetected = false;
    let currentActiveController = null;
    let abortController = null; 

    AFRAME.registerComponent('tabla-handler', {
      init: function () {
        const sceneEl = this.el;

        sceneEl.addEventListener("targetFound", async (event) => {
          targetDetected = true;
          clearInterval(multiplexInterval); 

          const targetIdx = event.detail.targetIndex;
          const currentBlockName = blockKeys[activeBlockIdx];
          const elementData = DATA_TABLA[currentBlockName][targetIdx];

          if (elementData) {
            if (abortController) abortController.abort();
            abortController = new AbortController();

            glbContainer.innerHTML = "";

            const anchorEntity = document.querySelector('#universalAnchor');
            anchorEntity.setAttribute('mindar-image-target', `targetIndex: ${targetIdx}`);

            const glbElement = document.createElement('a-gltf-model');
            glbElement.setAttribute('src', `./models/${elementData.model}.glb`);
            glbElement.setAttribute('position', '0 0 0');
            glbElement.setAttribute('scale', '0.6 0.6 0.6');
            glbElement.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear');
            
            glbContainer.appendChild(glbElement);

            document.querySelector('#elemBadge').innerText = elementData.symbol;
            document.querySelector('#elemName').innerText = elementData.name;
            document.querySelector('#elemCategory').innerText = elementData.group;
            document.querySelector('#elemDesc').innerText = elementData.desc;
            infoCard.classList.add('active');
          }
        });

        sceneEl.addEventListener("targetLost", () => {
          infoCard.classList.remove('active');
          glbContainer.innerHTML = ""; 
          targetDetected = false;
          
          if (abortController) abortController.abort();
          startMultiplexing(); 
        });
      }
    });

    function startMultiplexing() {
      if (multiplexInterval) clearInterval(multiplexInterval);

      const sceneEl = document.querySelector('#mainScene');
      const currentSystem = sceneEl.systems['mindar-image-system'];

      if (!currentSystem || !currentActiveController || currentActiveController.allBlocks.length < 2) return;

      multiplexInterval = setInterval(() => {
        if (targetDetected) return;

        activeBlockIdx = (activeBlockIdx + 1) % mindFiles.length;
        currentActiveController.activeTargets = currentActiveController.allBlocks[activeBlockIdx];
        currentSystem.imageTargetSrc = mindFiles[activeBlockIdx];

      }, 380); 
    }

    function injectMindAR() {
      const sceneEl = document.querySelector('#mainScene');
      
      // PASO 1: Inyectamos el Bloque 1 inmediatamente de manera estática para liberar la cámara web sin fricciones
      sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${mindFiles[0]}; autoStart: true; maxTrack: 1; uiScanning: no;`);
      sceneEl.setAttribute('tabla-handler', '');

      sceneEl.addEventListener("arReady", () => {
        const currentSystem = sceneEl.systems['mindar-image-system'];
        currentActiveController = currentSystem.controller;

        // PASO 2: La cámara ya está encendida y visible. Esperamos 2.5 segundos antes de procesar los demás bloques
        setTimeout(async () => {
          loaderStatus.style.display = "block";
          
          currentActiveController.allBlocks = [];
          
          // El bloque 1 ya fue cargado por A-Frame nativamente, lo asignamos directamente al índice 0
          currentActiveController.allBlocks.push(currentActiveController.imageTargets);
          
          // Compilamos los bloques 2 y 3 en caliente de forma asíncrona controlada
          for(let i = 1; i < mindFiles.length; i++) {
            const loadedTargets = await currentActiveController.addImageTargets(mindFiles[i]);
            currentActiveController.allBlocks.push(loadedTargets);
          }
          
          loaderStatus.style.display = "none";
          
          // PASO 3: Una vez que los buffers están consolidados de fondo, activamos el multiplexado continuo
          startMultiplexing();
        }, 2500); 
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      const sceneEl = document.querySelector('#mainScene');
      if (sceneEl.hasLoaded) {
        injectMindAR();
      } else {
        sceneEl.addEventListener("loaded", injectMindAR);
      }
    });
  </script>
</body>
</html>
