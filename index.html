  <style>
    body, html {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: #000;
      width: 100%;
      height: 100%;
    }

    /* Tu marca de agua original estilizada */
    .watermark {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.95);
      background: rgba(15, 23, 42, 0.85);
      padding: 8px 14px;
      border-radius: 30px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 999;
    }

    /* Nueva Interfaz de Usuario: Tarjeta Flotante Inferior (Bottom Sheet) */
    .element-card {
      position: fixed;
      bottom: -250px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 -12px 35px rgba(0, 0, 0, 0.35);
      z-index: 999;
      transition: bottom 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      backdrop-filter: blur(15px);
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .element-card.active {
      bottom: 25px;
    }

    .card-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .element-badge {
      width: 55px;
      height: 55px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 24px;
    }

    .element-title {
      margin-left: 15px;
    }

    .element-title h2 {
      margin: 0;
      font-size: 22px;
      color: #0f172a;
    }

    .element-title p {
      margin: 2px 0 0 0;
      font-size: 13px;
      color: #475569;
      font-weight: 600;
      text-transform: uppercase;
    }

    .element-data {
      font-size: 14px;
      color: #334155;
      border-top: 1px solid rgba(15, 23, 42, 0.08);
      padding-top: 12px;
      line-height: 1.6;
    }

    /* Pantalla de carga inicial para la optimización de la GPU */
    .ar-loader {
      position: fixed;
      top: 15px;
      right: 15px;
      font-size: 11px;
      color: #3b82f6;
      background: rgba(15, 23, 42, 0.9);
      padding: 8px 14px;
      border-radius: 20px;
      font-weight: 600;
      z-index: 999;
      border: 1px solid rgba(59, 130, 246, 0.3);
      display: none;
    }
  </style>
</head>

  <div class="watermark">Proyecto de la I. E. San José del Citará</div>
  <div id="loaderStatus" class="ar-loader">Optimizando Tabla Continua...</div>

  <div id="infoCard" class="element-card">
    <div class="card-header">

      <div class="element-title">
        <h2 id="elemName">-</h2>

      </div>
    </div>
    <div class="element-data">
      <span id="elemDesc">-</span>
    </div>
  </div>

    <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
    
    <!-- Contenedor Universal Dinámico: Mapea la posición espacial exacta del marcador detectado -->
    <a-entity id="universalAnchor" mindar-image-target="targetIndex: 0">
      <a-entity id="glbContainer"></a-entity>
    </a-entity>

        30: { symbol: "Rg", name: "Roentgenio", group: "Transactínido", desc: "Isótopos conocidos tienen un periodo de semidesintegración de 26 segundos.", model: "111Rg" },
        31: { symbol: "Cn", name: "Copernicio", group: "Transactínido", desc: "Elemento superpesado que actúa como un metal volátil en laboratorio.", model: "112Cn" },
        32: { symbol: "Nh", name: "Nihonio", group: "Transactínido", desc: "Primer elemento sintético descubierto y nombrado oficialmente en Japón.", model: "113Nh" },
        33: { symbol: "Fl", name: "Flerovio", group: "Transactínido", desc: "Elemento superpesado radiactivo artificial extremadamente inestable.", model: "114Fl" },
        34: { symbol: "Mc", name: "Moscovio", group: "Transactínido", desc: "Fusión artificial bombardeando americio con iones de calcio.", model: "115Mc" },
        35: { symbol: "Lv", name: "Livermorio", group: "Transactínido", desc: "Producido en aceleradores de partículas por colaboración ruso-estadounidense.", model: "116Lv" },
        36: { symbol: "Ts", name: "Tenesino", group: "Transactínido", desc: "Halógeno superpesado artificial sintetizado en laboratorios avanzados.", model: "117Ts" },
        37: { symbol: "Og", name: "Oganesón", group: "Transactínido", desc: "El elemento con mayor masa y número atómico descubierto por la humanidad.", model: "118Og" }
      }
    };

    const infoCard = document.querySelector('#infoCard');
    const glbContainer = document.querySelector('#glbContainer');
    const loaderStatus = document.querySelector('#loaderStatus');
    
    const mindFiles = ["./targets/bloque1.mind", "./targets/bloque2.mind", "./targets/bloque3.mind"];
    const blockKeys = ["bloque1", "bloque2", "bloque3"];
    
    let activeBlockIdx = 0;
    let multiplexInterval = null;
    let targetDetected = false;
    let currentActiveController = null;
    let abortController = null; 

    // COMPONENTE DINÁMICO: Vincula los eventos de A-Frame con la inyección dinámica de archivos .glb
    AFRAME.registerComponent('tabla-handler', {
      init: function () {
        const sceneEl = this.el;

        sceneEl.addEventListener("targetFound", async (event) => {
          targetDetected = true;
          clearInterval(multiplexInterval); // Pausa el escaneo lógico inmediatamente

          const targetIdx = event.detail.targetIndex;
          const currentBlockName = blockKeys[activeBlockIdx];
          const elementData = DATA_TABLA[currentBlockName][targetIdx];

          if (elementData) {
            if (abortController) abortController.abort();
            abortController = new AbortController();

            // Vaciado preventivo de la memoria de polígonos
            glbContainer.innerHTML = "";

            // Re-anclamos el contenedor universal al targetIndex específico reportado por la GPU
            const anchorEntity = document.querySelector('#universalAnchor');
            anchorEntity.setAttribute('mindar-image-target', `targetIndex: ${targetIdx}`);

            // Creación dinámica del nodo tridimensional (.glb) bajo demanda
            const glbElement = document.createElement('a-gltf-model');
            glbElement.setAttribute('src', `./models/${elementData.model}.glb`);
            glbElement.setAttribute('position', '0 0 0');
            glbElement.setAttribute('scale', '0.6 0.6 0.6');
            // Agregamos una animación nativa para dotar de rotación continua al átomo
            glbElement.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear');
            
            glbContainer.appendChild(glbElement);

            // Pintar los datos del elemento químico en el Bottom Sheet de la UI
            document.querySelector('#elemBadge').innerText = elementData.symbol;
            document.querySelector('#elemName').innerText = elementData.name;
            document.querySelector('#elemCategory').innerText = elementData.group;
            document.querySelector('#elemDesc').innerText = elementData.desc;
            infoCard.classList.add('active');
          }
        });

        sceneEl.addEventListener("targetLost", () => {
          infoCard.classList.remove('active');
          glbContainer.innerHTML = ""; // Vaciado automático de la memoria RAM del celular
          targetDetected = false;
          
          if (abortController) abortController.abort();
          startMultiplexing(); // Reanuda el multiplexor lógico continuo
        });
      }
    });

    // SISTEMA DE MULTIPLEXADO SEGURO POR INTERCAMBIO DE PUNTEROS EN LA GPU
    function startMultiplexing() {
      if (multiplexInterval) clearInterval(multiplexInterval);

      const sceneEl = document.querySelector('#mainScene');
      const currentSystem = sceneEl.systems['mindar-image-system'];

      if (!currentSystem || !currentActiveController || currentActiveController.allBlocks.length < 2) return;

      multiplexInterval = setInterval(() => {
        if (targetDetected) return;

        // Avanzamos el puntero de indexación lógica
        activeBlockIdx = (activeBlockIdx + 1) % mindFiles.length;
        
        // Swappeo de bitmaps directo sobre la RAM gráfica en tiempo de ejecución (0% de CPU extra)
        currentActiveController.activeTargets = currentActiveController.allBlocks[activeBlockIdx];
        currentSystem.imageTargetSrc = mindFiles[activeBlockIdx];

      }, 380); // Muestreo equilibrado cada 380ms
    }

    // ORQUESTADOR DE ARRANQUE BASADO EN EL ESTADO FÍSICO DEL DOM
    function injectMindAR() {
      const sceneEl = document.querySelector('#mainScene');
      
      // PASO 1: Inyectamos de forma nativa la directiva en tu escena raíz para activar la cámara de forma indestructible
      sceneEl.setAttribute('mindar-image', `imageTargetSrc: ${mindFiles[0]}; autoStart: true; maxTrack: 1; uiScanning: no;`);
      sceneEl.setAttribute('tabla-handler', '');

      sceneEl.addEventListener("arReady", () => {
        const currentSystem = sceneEl.systems['mindar-image-system'];
        currentActiveController = currentSystem.controller;

        // PASO 2: La cámara web ya está abierta e iluminada en pantalla. Esperamos 2.5 segundos de cortesía
        setTimeout(async () => {
          loaderStatus.style.display = "block";
          
          currentActiveController.allBlocks = [];
          
          // Guardamos las firmas del bloque 1 que A-Frame compiló en el inicio
          currentActiveController.allBlocks.push(currentActiveController.imageTargets);
          
          // Compilamos asíncronamente los descriptores de los bloques 2 y 3 sobre la GPU activa
          for(let i = 1; i < mindFiles.length; i++) {
            const loadedTargets = await currentActiveController.addImageTargets(mindFiles[i]);
            currentActiveController.allBlocks.push(loadedTargets);
          }
          
          loaderStatus.style.display = "none";
          
          // PASO 3: Una vez consolidada la caché de fondo, encendemos el multiplexado sin parpadeos en negro
          startMultiplexing();
        }, 2500); 
      });
    }

    // Bloqueo estricto de condiciones de carrera en navegadores de teléfonos móviles
    window.addEventListener("DOMContentLoaded", () => {
      const sceneEl = document.querySelector('#mainScene');
      if (sceneEl.hasLoaded) {
        injectMindAR();
      } else {
        sceneEl.addEventListener("loaded", injectMindAR);
      }
    });
  </script>
</body>
