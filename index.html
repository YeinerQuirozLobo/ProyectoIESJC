<!-- index.html - Pantalla Única de Escaneo Continuo para el Sistema IE San José -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla Periódica Interactiva - RA</title>

  <!-- Librerías de Visualización 3D y RA -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <!-- Importamos el cerebro de datos del elemento que creamos arriba -->
  <script src="./datos-tabla.js"></script>

  <style>
    body, html {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: #000;
      width: 100%;
      height: 100%;
    }

    /* Identificador Institucional */
    .watermark {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.95);
      background: rgba(15, 23, 42, 0.75);
      padding: 8px 14px;
      border-radius: 30px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 999;
    }

    /* Interfaz de Usuario Moderna (Bottom Sheet) */
    .element-card {
      position: fixed;
      bottom: -250px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 -12px 35px rgba(0, 0, 0, 0.4);
      z-index: 999;
      transition: bottom 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      backdrop-filter: blur(15px);
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .element-card.active {
      bottom: 25px;
    }

    .card-header {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .element-badge {
      width: 55px;
      height: 55px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 24px;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.45);
    }

    .element-title {
      margin-left: 15px;
    }

    .element-title h2 {
      margin: 0;
      font-size: 22px;
      color: #0f172a;
      font-weight: 700;
    }

    .element-title p {
      margin: 2px 0 0 0;
      font-size: 13px;
      color: #475569;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .element-data {
      font-size: 14px;
      color: #334155;
      border-top: 1px solid rgba(15, 23, 42, 0.08);
      padding-top: 12px;
      line-height: 1.6;
    }

    #sceneContainer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

  <div class="watermark">Sistema IE San José</div>

  <!-- Panel de Información UI Emergente -->
  <div id="infoCard" class="element-card">
    <div class="card-header">
      <div id="elemBadge" class="element-badge">-</div>
      <div class="element-title">
        <h2 id="elemName">-</h2>
        <p id="elemCategory">-</p>
      </div>
    </div>
    <div class="element-data">
      <span id="elemDesc">-</span>
    </div>
  </div>

  <!-- Contenedor único donde corre la Realidad Aumentada -->
  <div id="sceneContainer"></div>

  <script>
    let currentBlockIndex = 0;
    let scannerInterval = null;
    let isElementTracking = false;
    const infoCard = document.querySelector('#infoCard');

    // Registrar el componente de escucha en A-Frame
    AFRAME.registerComponent('ar-tracker', {
      init: function () {
        this.el.addEventListener("targetFound", (event) => {
          // Detener el escaneo secuencial para enfocar el procesador en el elemento visto
          isElementTracking = true;
          clearInterval(scannerInterval);

          const targetIdx = event.detail.targetIndex;
          const currentBlock = periodicBlocks[currentBlockIndex];
          const elementData = currentBlock.elements[targetIdx];

          if (elementData) {
            const modelContainer = document.querySelector('#modelContainer');
            if (modelContainer) modelContainer.innerHTML = "";

            // Crear nodo .glb bajo demanda en tiempo real
            const glbElement = document.createElement('a-gltf-model');
            glbElement.setAttribute('src', elementData.model);
            glbElement.setAttribute('position', '0 0 0');
            glbElement.setAttribute('scale', '0.7 0.7 0.7'); 
            glbElement.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear');
            glbElement.setAttribute('mindar-image-target', `targetIndex: ${targetIdx}`);
            
            if (modelContainer) modelContainer.appendChild(glbElement);

            // Poblar campos de la Interfaz Gráfica
            document.querySelector('#elemBadge').innerText = elementData.symbol;
            document.querySelector('#elemName').innerText = elementData.name;
            document.querySelector('#elemCategory').innerText = elementData.group;
            document.querySelector('#elemDesc').innerText = elementData.desc;
            infoCard.classList.add('active');
          }
        });

        this.el.addEventListener("targetLost", () => {
          // Si el estudiante retira el celular, limpiamos memoria y volvemos a rastrear
          infoCard.classList.remove('active');
          isElementTracking = false;
          startDynamicScanner();
        });
      }
    });

    // Inyector Dinámico de Escenas RA
    function loadScene(block) {
      const container = document.querySelector('#sceneContainer');
      container.innerHTML = ""; // Limpieza total de memoria RAM

      const sceneHTML = `
        <a-scene mindar-scene-container mindar-image="imageTargetSrc: ${block.file}; autoStart: true; maxTrack: 1; warmupTolerance: 1; missTolerance: 2; uiScanning: no;" 
                 vr-mode-ui="enabled: false" 
                 device-orientation-permission-ui="enabled: false"
                 ar-tracker>
          <a-assets></a-assets>
          <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
          <a-entity id="modelContainer"></a-entity>
        </a-scene>
      `;
      container.innerHTML = sceneHTML;
    }

    // Bucle cíclico automático
    function startDynamicScanner() {
      if (scannerInterval) clearInterval(scannerInterval);

      scannerInterval = setInterval(() => {
        if (!isElementTracking) {
          currentBlockIndex = (currentBlockIndex + 1) % periodicBlocks.length;
          loadScene(periodicBlocks[currentBlockIndex]);
        }
      }, 350); // Alternancia óptima de descriptores
    }

    // Arranque inicial
    window.addEventListener('DOMContentLoaded', () => {
      loadScene(periodicBlocks[0]);
      startDynamicScanner();
    });
  </script>
</body>
</html>
